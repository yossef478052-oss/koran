*,*::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0;

:root {
  --gold:      #D4AF37;
  --gold-dark: #B8860B;
  --gold-soft: #e8c84a;
  --white:     #FFFFFF;
  --bg:        #FFF8E7;
  --bg2:       #FFF2D0;
  --bg3:       #FDE8A8;
  --ink:       #2C1A00;
  --ink2:      #5C3D00;
  --muted:     #9A7A3A;
  --border:    rgba(212,175,55,.22);
  --border-md: rgba(212,175,55,.4);
  --shadow:    rgba(184,134,11,.15);
  --serif:     'Cinzel', serif;
  --body:      'Lato', sans-serif;
  --arabic:    'Amiri', serif;
  --trans:     .3s cubic-bezier(.4,0,.2,1);
  --radius:    12px;
}
html { 
    scroll-behavior: smooth; 
}
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.65;
  overflow-x: hidden;
}
nav {
  position: fixed; 
  top: 0; 
  left: 0; 
  right: 0; 
  z-index: 200;
  background: rgba(255,248,231,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
::-webkit-scrollbar { 
    width: 6px; 
}
::-webkit-scrollbar-track { 
    background: var(--bg); 
}
::-webkit-scrollbar-thumb { 
    background: var(--gold-dark); 
    border-radius: 3px; 
}
.nav-inner {
  max-width: 1100px; 
  margin: 0 auto; 
  padding: 0 32px;
  height: 60px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between;
}
.nav-logo {
  font-family: var(--serif);
  font-size: 2.2rem; 
  font-weight: 700;
  color: var(--gold-dark);
  letter-spacing: .08em;
}
.nav-links { 
    display: flex; 
    gap: 15px; 
}
.nav-links a {
  font-size: 1rem; 
  font-weight: 400;
  letter-spacing: .1em; 
  text-transform: uppercase;
  color: var(--ink2);
  padding: 6px 12px; 
  border-radius: 6px;
  text-decoration: none;
  transition: background var(--trans), color var(--trans);
}
.nav-links a:hover,
.nav-links a.active{ 
    background: var(--bg3); 
    color: var(--gold-dark); 
}
.nav-inner .login{
  width: max-content;
  padding: 6px 12px 6px 12px;
  background-color: #B8860B;
  color: white;
  border-radius: 25px;
  text-decoration: none;
}
section { 
    padding: 80px 0; 
}
.container { 
    max-width: 1100px;
    margin: 0 auto; 
    padding: 0 32px; 
}
.section-label {
  text-align: center; 
  margin-bottom: 48px;
}
.section-label-tag {
  font-size: .7rem; 
  font-weight: 400;
  letter-spacing: .22em; 
  text-transform: uppercase;
  color: var(--muted);
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 12px;
  margin-bottom: 10px;
}
.section-label-tag::before,
.section-label-tag::after {
  content: ''; 
  flex: 0 0 32px; 
  height: 1px; 
  background: var(--border-md);
}
.section-title {
  font-family: var(--serif);
  font-size: clamp(3.4rem, 3.5vw, 2.2rem);
  font-weight: 700; 
  color: var(--gold-dark);
  letter-spacing: .04em;
}
.section-ornament {
  display: block; 
  text-align: center;
  font-size: 1.3rem; 
  color: var(--gold);
  margin-top: 6px; 
  line-height: 1;
}
.reciter-row {
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 10px;
  margin-bottom: 24px;
  font-size: .82rem; 
  color: var(--muted);
}
.reciter-name { 
    color: var(--gold-dark); 
    font-weight: 400; 
}

.quran-section { 
    background: var(--bg); 
    opacity: 0;
    animation: quran 2.5s ease forwards;
}
.quran-search-wrap {
  max-width: 460px;
  margin: 0 auto 36px;
  position: relative;
}
.quran-search {
  width: 100%; 
  padding: 13px 20px 13px 48px;
  border: 1.5px solid var(--border-md);
  border-radius: 50px;
  background: var(--white);
  font-family: var(--body); 
  font-size: .9rem;
  color: var(--ink);
  outline: none;
  transition: border-color var(--trans), box-shadow var(--trans);
  border-color: var(--gold);
}
.quran-search:focus {  
    box-shadow: 0 0 0 3px rgba(212,175,55,.12); 
}
.search-icon {
  position: absolute; 
  left: 18px; 
  top: 50%; 
  transform: translateY(-50%);
  font-size: 1rem; 
  pointer-events: none; 
  color: var(--muted);
}
.surah-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  max-height: 600px; 
  overflow-y: auto;
  padding-right: 4px;
}
.surah-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex; 
  align-items: center; 
  gap: 12px;
  transition: box-shadow var(--trans), border-color var(--trans);
  cursor: pointer;
}
.surah-card:hover { 
    border-color: var(--gold); 
    box-shadow: 0 4px 16px var(--shadow); 
}
.surah-num {
  width: 36px; 
  height: 36px; 
  flex-shrink: 0;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
  border-radius: 8px;
  display: flex; 
  align-items: center; 
  justify-content: center;
  font-family: var(--serif); 
  font-size: .78rem; 
  font-weight: 700; 
  color: var(--white);
}
.surah-info { 
    flex: 1; 
    min-width: 0; 
}
.surah-name-en { 
    font-size: .88rem; 
    font-weight: 400; 
    color: var(--ink); 
}
.surah-name-ar { 
    font-family: var(--arabic); 
    font-size: .95rem; 
    color: var(--gold-dark); 
}
.surah-meta { 
    font-size: .7rem; 
    color: var(--muted); 
}
.surah-play {
  background: none; 
  border: 1.5px solid var(--border-md);
  border-radius: 50%; 
  width: 32px; 
  height: 32px;
  display: flex; 
  align-items: center;
  justify-content: center;
  cursor: pointer; 
  font-size: .8rem;
  transition: background var(--trans), border-color var(--trans);
  flex-shrink: 0;
}
.surah-play:hover { 
    background: var(--gold); 
    border-color: var(--gold); 
}
@keyframes quran {
  from { 
    opacity: 0; 
    transform: translateY(12px); 
}
  to   { 
    opacity: 1; 
    transform: translateY(0); 
}
}
footer {
  background: var(--ink);
  border-top: 2px solid var(--gold-dark);
  padding: 48px 0 32px;
  text-align: center;
}
.footer-logo {
  font-family: var(--serif);
  font-size: 2.8rem; 
  font-weight: 700;
  color: var(--gold); 
  letter-spacing: .08em;
  margin-bottom: 8px;

.footer-bismillah {
  font-family: var(--arabic);
  font-size: 1.1rem; 
  color: rgba(255,255,255,.5);
  margin-bottom: 20px;

.footer-links {
  display: flex; 
  justify-content: center; 
  gap: 24px; 
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.footer-links a {
  font-size: .72rem; 
  letter-spacing: .1em; 
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  transition: color var(--trans);
  text-decoration: none;
}
.footer-links a:hover { 
    color: var(--gold); 
}
.footer-copy {
  font-size: .7rem; 
  color: rgba(255,255,255,.25);
  letter-spacing: .08em;
}

body.js-reveal .reveal {
  opacity: 0; 
  transform: translateY(28px);
  transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1);
}
body.js-reveal .reveal.in { 
    opacity: 1; transform: none; 
}
.reveal-d1 { 
    transition-delay: .1s; 
}
.reveal-d2 { 
    transition-delay: .2s; 
}
.reveal-d3 { 
    transition-delay: .3s; 
}
.reveal-d4 { 
    transition-delay: .4s;

@media(max-width:720px){
  .prayer-grid { 
    grid-template-columns: repeat(2,1fr);

  .stats-grid  {

 }

@media(max-width:480px){

  .stats-grid  {

}

function renderSurahs(list){
  const grid = document.getElementById('surah-grid');
  grid.innerHTML = list.map(s=>`
    <div class="surah-card" tabindex="0" role="button" aria-label="Surah ${s.en}">
      <div class="surah-num">${s.num}</div>
      <div class="surah-info">
        <div class="surah-name-en">${s.en}</div>
        <div class="surah-name-ar">${s.ar}</div>
        <div class="surah-meta">${s.verses} verses · ${s.type}</div>
      </div>
      <button class="surah-play" title="Play ${s.en}" onclick="playSurah(${s.num})">▶</button>
    </div>
  `).join('');
}
renderSurahs(SURAHS);

function filterSurahs(query){
  const q = query.trim().toLowerCase();

  if(q === ""){
    renderSurahs(SURAHS);
    return;
  }

  const filtered = SURAHS.filter(s => 
    s.en.toLowerCase().includes(q) ||
    s.ar.includes(q) ||
    String(s.num).includes(q)
  );

  renderSurahs(filtered);
}
