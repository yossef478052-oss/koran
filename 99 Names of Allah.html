<style>
    *,*::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
}
:root {
  --gold:      #D4AF37;
  --gold-dark: #B8860B;
  --gold-soft: #e8c84a;
  --white:     #FFFFFF;
  --bg:        #FFF8E7;
  --bg2:       #FFF2D0;
  --bg3:       #FDE8A8;
  --ink:       #2C1A00;
  --ink2:      #5C3D00;
  --muted:     #9A7A3A;
  --border:    rgba(212,175,55,.22);
  --border-md: rgba(212,175,55,.4);
  --shadow:    rgba(184,134,11,.15);
  --serif:     'Cinzel', serif;
  --body:      'Lato', sans-serif;
  --arabic:    'Amiri', serif;
  --trans:     .3s cubic-bezier(.4,0,.2,1);
  --radius:    12px;
}
html { 
    scroll-behavior: smooth; 
}
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.65;
  overflow-x: hidden;
}
::-webkit-scrollbar { 
    width: 6px; 
}
::-webkit-scrollbar-track { 
    background: var(--bg); 
}
::-webkit-scrollbar-thumb { 
    background: var(--gold-dark); 
    border-radius: 3px; 
}
nav {
  position: fixed; 
  top: 0; 
  left: 0; 
  right: 0; 
  z-index: 200;
  background: rgba(255,248,231,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1100px; 
  margin: 0 auto; 
  padding: 0 32px;
  height: 60px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between;
}
.nav-logo {
  font-family: var(--serif);
  font-size: 2.2rem; 
  font-weight: 700;
  color: var(--gold-dark);
  letter-spacing: .08em;
}
.nav-links { 
    display: flex; 
    gap: 15px; 
}
.nav-links a {
  font-size: 1rem; 
  font-weight: 400;
  letter-spacing: .1em; 
  text-transform: uppercase;
  color: var(--ink2);
  padding: 6px 12px; 
  border-radius: 6px;
  text-decoration: none;
  transition: background var(--trans), color var(--trans);
}
.nav-links a:hover,
.nav-links a.active{ 
    background: var(--bg3); 
    color: var(--gold-dark); 
}
.nav-inner .login{
  width: max-content;
  padding: 6px 12px 6px 12px;
  background-color: #B8860B;
  color: white;
  border-radius: 25px;
  text-decoration: none;
}
section { 
    padding: 80px 0; 
}
.container { 
    max-width: 1100px;
    margin: 0 auto; 
    padding: 0 32px; 
}
.section-label {
  text-align: center; 
  margin-bottom: 48px;
}
.section-label-tag {
  font-size: .7rem; 
  font-weight: 400;
  letter-spacing: .22em; 
  text-transform: uppercase;
  color: var(--muted);
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 12px;
  margin-bottom: 10px;
}
.section-label-tag::before,
.section-label-tag::after {
  content: ''; 
  flex: 0 0 32px; 
  height: 1px; 
  background: var(--border-md);
}
.section-title {
  font-family: var(--serif);
  font-size: clamp(1.6rem, 3.5vw, 2.2rem);
  font-weight: 700; 
  color: var(--gold-dark);
  letter-spacing: .04em;
}
.section-ornament {
  display: block; 
  text-align: center;
  font-size: 1.3rem; 
  color: var(--gold);
  margin-top: 6px; 
  line-height: 1;
}
.names-section { 
    background: var(--bg2); 
    border-top: 1px solid var(--border); 
    border-bottom: 1px solid var(--border); 
    opacity: 0;
    animation: name 2.5s ease forwards;
}
.names-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  max-height: 600px;
  overflow-y: auto;
}
.name-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 16px;
  text-align: center;
  display: flex; 
  flex-direction: column; 
  gap: 8px; 
  align-items: center;
  cursor: default;
  transition: box-shadow var(--trans), transform var(--trans), border-color var(--trans);
  position: relative; 
  overflow: hidden;
}
.name-card::before {
  content: '';
  position: absolute; 
  inset: 0;
  background: linear-gradient(135deg, rgba(212,175,55,.05) 0%, transparent 60%);
  
}
.name-card:hover { 
    box-shadow: 0 8px 28px var(--shadow); 
    transform: translateY(-4px); 
    border-color: var(--gold); 
}
.name-card:hover::before { 
    opacity: 1; 
}
.name-arabic {
  font-family: var(--arabic);
  font-size: 1.6rem; 
  font-weight: 700;
  color: var(--gold-dark); 
  line-height: 1.2;
}
.name-en {
  font-family: var(--serif);
  font-size: .82rem; 
  font-weight: 700;
  color: var(--ink); 
  letter-spacing: .06em; 
  text-transform: uppercase;
}
.name-meaning { 
    font-size: .72rem; 
    color: var(--muted); 
    line-height: 1.5; 
}
@keyframes name {
  from { 
    opacity: 0; 
    transform: translateY(20px); 
}
  to   { 
    opacity: 1; 
    transform: translateY(0); 
}
}
footer {
  background: var(--ink);
  border-top: 2px solid var(--gold-dark);
  padding: 48px 0 32px;
  text-align: center;
}
.footer-logo {
  font-family: var(--serif);
  font-size: 2.8rem; 
  font-weight: 700;
  color: var(--gold); 
  letter-spacing: .08em;
  margin-bottom: 8px;
}
.footer-bismillah {
  font-family: var(--arabic);
  font-size: 1.1rem; 
  color: rgba(255,255,255,.5);
  margin-bottom: 20px;
}
.footer-links {
  display: flex; 
  justify-content: center; 
  gap: 24px; 
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.footer-links a {
  font-size: .72rem; 
  letter-spacing: .1em; 
  text-transform: uppercase;
  color: rgba(255,255,255,.4);
  transition: color var(--trans);
  text-decoration: none;
}
.footer-links a:hover { 
    color: var(--gold); 
}
.footer-copy {
  font-size: .7rem; 
  color: rgba(255,255,255,.25);
  letter-spacing: .08em;
}

body.js-reveal .reveal {
  opacity: 0; 
  transform: translateY(28px);
  transition: opacity .7s cubic-bezier(.4,0,.2,1), transform .7s cubic-bezier(.4,0,.2,1);
}
body.js-reveal .reveal.in { 
    opacity: 1; transform: none; 
}
.reveal-d1 { 
    transition-delay: .1s; 
}
.reveal-d2 { 
    transition-delay: .2s; 
}
.reveal-d3 { 
    transition-delay: .3s; 
}
.reveal-d4 { 
    transition-delay: .4s; 
}

@media(max-width:720px){
  .prayer-grid { 
    grid-template-columns: repeat(2,1fr); 
}
  .stats-grid  { 
    grid-template-columns: 1fr 1fr;
 }
  .container { 
    padding: 0 16px; 
}
  .nav-links { 
    display: none; 
}
  .message-banner { 
    padding: 28px 20px; 
}
  .dhikr-card { 
    flex-direction: column; 
}
}
@media(max-width:480px){
  .prayer-grid { 
    grid-template-columns: 1fr 1fr; 
}
  .stats-grid  { 
    grid-template-columns: 1fr;
}
}
</style>
</head>

(function renderNames(){
  const g = document.getElementById('names-grid');
  g.innerHTML = NAMES.map((n,i)=>`
    <div class="name-card reveal ${i%4===0?'':i%4===1?'reveal-d1':i%4===2?'reveal-d2':'reveal-d3'}">
      <div class="name-arabic">${n.ar}</div>
      <div class="name-en">${n.en}</div>
      <div class="name-meaning">${n.meaning}</div>
    </div>
  `).join('');
  setTimeout(()=>{ document.querySelectorAll('.name-card').forEach(el => io.observe(el)); }, 50);
})();

document.addEventListener('keydown', e=>{
  if((e.key==='Enter'||e.key===' ') && e.target.classList.contains('dhikr-counter')){
    e.preventDefault(); countDhikr(e.target);
